# Full schedule sync + all missing timelines + derived tables (no HTML, no email).
# step2_get_schedule: schedules.json is fetched with start/limit pagination until complete;
# every match is upserted; data/schedule.csv is rewritten.
# Runs twice weekly so All Games stays fresh between runs; weekly email workflow still regenerates HTML separately.
# Daily CI uses run_all.py --daily (Supabase kickoff-window timeline probes; no schedule fetch).
#
# Cron is UTC only — Pacific shifts with DST (~1h). Approximate targets:
#   • Monday 01:00 UTC → Sunday ~5:00 PM Pacific (exact under PST).
#   • Thursday 16:00 UTC → Thursday ~8:00 AM Pacific (exact under PST).
name: Bi-weekly Data Refresh (includes full schedule check)

on:
  schedule:
    - cron: "0 1 * * 1"
    - cron: "0 16 * * 4"
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Full backfill (steps 2–5)
        env:
          SPORTRADAR_API_KEY: ${{ secrets.SPORTRADAR_API_KEY }}
          SUPABASE_URL: https://yoesorfzvtbdmvrdtqoo.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          export PYTHONUTF8=1
          python run_all.py --full-backfill

      - name: Commit and push data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/schedule.csv data/own_goals.csv
          if git diff --staged --quiet; then
            echo "No CSV changes to commit"
          else
            git commit -m "chore: bi-weekly data backfill (schedule + derived CSV) [skip ci]"
            git push
          fi
