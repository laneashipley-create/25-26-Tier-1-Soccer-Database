# Daily full refresh: full schedule sync + timelines + derived tables + all HTML reports (no email).
# After step 2, run_all syncs games.recorded from soccer record replay export JSON (step 2b).
# Schedule: schedules.json is fetched with pagination until complete; matches upsert to Supabase;
# data/schedule.csv is rewritten. Step 7 regenerates hub + report pages for GitHub Pages.
# Runs once daily for a complete data + HTML refresh between weekly-email runs.
# Daily CI uses run_all.py --daily (Supabase kickoff-window timeline probes; no schedule fetch).
#
# Cron is UTC only — Pacific shifts with DST (~1h). Target:
#   • 04:00 AM PST daily → 12:00 UTC daily (during PDT this lands at ~05:00 AM local).
name: Daily Full Refresh (includes full schedule check)

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Full backfill + HTML (steps 1–7)
        env:
          SPORTRADAR_API_KEY: ${{ secrets.SPORTRADAR_API_KEY }}
          SUPABASE_URL: https://yoesorfzvtbdmvrdtqoo.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          export PYTHONUTF8=1
          python run_all.py --full-backfill

      - name: Convert logo SVG to PNG (for Outlook/GitHub Pages)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq librsvg2-bin
          rsvg-convert -w 360 assets/lanes_sportsdata.svg -o assets/lanes_sportsdata.png

      - name: Commit and push data + reports
        env:
          SUPABASE_URL: https://yoesorfzvtbdmvrdtqoo.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          REPORT_FILES=(
            report.html report_hub.html report_archive.html wc2026_schedule.html
            report_own_goals.html report_master_games.html
            report_penalty_shootouts.html report_var_events.html
            report_var_unpaired.html report_water_break_events.html
            report_water_break_unpaired.html report_recordings_library.html
            data/schedule.csv data/own_goals.csv assets/lanes_sportsdata.png
          )
          COMMIT_MSG="chore: daily full refresh (schedule, CSV, HTML) [skip ci]"
          MAX_RETRIES=3
          KEEP_DIR="$RUNNER_TEMP/workflow-keep"
          mkdir -p "$KEEP_DIR" "$KEEP_DIR/data" "$KEEP_DIR/assets"

          for attempt in $(seq 1 "$MAX_RETRIES"); do
            git add "${REPORT_FILES[@]}" || true
            if git diff --staged --quiet; then
              echo "Attempt $attempt: no changes to commit."
              exit 0
            fi
            git commit -m "$COMMIT_MSG"

            if git push; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi

            echo "Push attempt $attempt rejected."
            if [ "$attempt" -ge "$MAX_RETRIES" ]; then
              break
            fi

            echo "Preserving workflow data files, pulling latest source, regenerating HTML..."
            cp data/schedule.csv "$KEEP_DIR/data/schedule.csv" 2>/dev/null || true
            cp data/own_goals.csv "$KEEP_DIR/data/own_goals.csv" 2>/dev/null || true
            cp assets/lanes_sportsdata.png "$KEEP_DIR/assets/lanes_sportsdata.png" 2>/dev/null || true

            git fetch origin main
            git reset --hard origin/main
            python -m pip install -q -r requirements.txt

            cp "$KEEP_DIR/data/schedule.csv" data/schedule.csv 2>/dev/null || true
            cp "$KEEP_DIR/data/own_goals.csv" data/own_goals.csv 2>/dev/null || true
            cp "$KEEP_DIR/assets/lanes_sportsdata.png" assets/lanes_sportsdata.png 2>/dev/null || true

            export PYTHONUTF8=1
            python run_all.py --reports-only
            if [ -f assets/lanes_sportsdata.svg ]; then
              rsvg-convert -w 360 assets/lanes_sportsdata.svg -o assets/lanes_sportsdata.png || true
            fi
          done

          echo "Push failed after $MAX_RETRIES attempts."
          exit 1
