# EPL Own Goals — Daily incremental refresh (no email).
# Uses: python run_all.py --daily
#   → Lightweight step 2: schedule JSON per season is fetched; only matches whose kickoff
#   (UTC date) is within ± PIPELINE_DAILY_SCHEDULE_WINDOW_DAYS (default 5) of today are
#   upserted to Supabase (status/scores/time changes). Does not overwrite data/schedule.csv.
#   Step 3–6 only when completed matches lack timelines (kickoff within last
#   PIPELINE_RECENT_TIMELINE_DAYS, default 14).
# Full season CSV + every-game upsert: weekly-data-pipeline.yml (Wed 04:00 UTC).
# HTML + Brevo: weekly-update.yml (Wed 05:00 UTC).
name: Daily Refresh - Adding Completed Games

on:
  schedule:
    # 06:00 UTC every day (~10:00 PM previous calendar date Pacific in standard time, ~11:00 PM in DST).
    # Email is never sent from this workflow.
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run update pipeline
        env:
          SPORTRADAR_API_KEY: ${{ secrets.SPORTRADAR_API_KEY }}
          SUPABASE_URL: https://yoesorfzvtbdmvrdtqoo.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          export PYTHONUTF8=1
          python run_all.py --daily

      - name: Convert logo SVG to PNG (for Outlook/Gmail compatibility)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq librsvg2-bin
          rsvg-convert -w 360 assets/lanes_sportsdata.svg -o assets/lanes_sportsdata.png

      - name: Commit and push updated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add report.html report_hub.html report_own_goals.html report_master_games.html report_penalty_shootouts.html report_var_events.html report_var_unpaired.html report_recordings_library.html data/schedule.csv data/own_goals.csv assets/lanes_sportsdata.png
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily own goals pipeline refresh [skip ci]"
            git push
          fi
