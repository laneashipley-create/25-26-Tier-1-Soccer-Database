# EPL Own Goals — Daily incremental refresh (no email).
# Uses: python run_all.py --daily
#   → Step 3: Supabase All Games rows whose kickoff UTC calendar date is within
#   [today - PIPELINE_DAILY_TIMELINE_KICKOFF_DAYS_BEFORE,
#    today + PIPELINE_DAILY_TIMELINE_KICKOFF_DAYS_AFTER] (defaults 1 / 1).
#   For each row without a timeline yet: Sportradar timeline.json; store only when status is
#   closed/ended. Steps 4–6 run only when at least one timeline was newly stored.
# Full season sync + pagination + CSV: weekly-data-pipeline.yml (daily full refresh, separate workflow).
# HTML + Brevo: weekly-update.yml (still scheduled separately).
name: Daily Refresh - Adding Completed Games

on:
  schedule:
    # 3x/day targets in Pacific Standard Time (PST, UTC-8):
    #   10:00 AM PST -> 18:00 UTC
    #   4:00 PM PST  -> 00:00 UTC (next UTC date)
    #   10:00 PM PST -> 06:00 UTC (next UTC date)
    # During DST (PDT), runs occur one hour later by local clock.
    # Email is never sent from this workflow.
    - cron: "0 18 * * *"
    - cron: "0 0 * * *"
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run update pipeline
        env:
          SPORTRADAR_API_KEY: ${{ secrets.SPORTRADAR_API_KEY }}
          SUPABASE_URL: https://yoesorfzvtbdmvrdtqoo.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          export PYTHONUTF8=1
          python run_all.py --daily

      - name: Convert logo SVG to PNG (for Outlook/Gmail compatibility)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq librsvg2-bin
          rsvg-convert -w 360 assets/lanes_sportsdata.svg -o assets/lanes_sportsdata.png

      - name: Commit and push updated report
        env:
          SUPABASE_URL: https://yoesorfzvtbdmvrdtqoo.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          REPORT_FILES=(
            report.html report_hub.html wc2026_schedule.html
            report_own_goals.html report_master_games.html
            report_penalty_shootouts.html report_var_events.html
            report_var_unpaired.html report_water_break_events.html
            report_water_break_unpaired.html report_recordings_library.html
            data/schedule.csv data/own_goals.csv assets/lanes_sportsdata.png
          )
          COMMIT_MSG="chore: daily own goals pipeline refresh [skip ci]"
          MAX_RETRIES=3
          KEEP_DIR="$RUNNER_TEMP/workflow-keep"
          mkdir -p "$KEEP_DIR" "$KEEP_DIR/data" "$KEEP_DIR/assets"

          for attempt in $(seq 1 "$MAX_RETRIES"); do
            git add "${REPORT_FILES[@]}" || true
            if git diff --staged --quiet; then
              echo "Attempt $attempt: no changes to commit."
              exit 0
            fi
            git commit -m "$COMMIT_MSG"

            if git push; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi

            echo "Push attempt $attempt rejected."
            if [ "$attempt" -ge "$MAX_RETRIES" ]; then
              break
            fi

            echo "Preserving workflow data files, pulling latest source, regenerating HTML..."
            cp data/schedule.csv "$KEEP_DIR/data/schedule.csv" 2>/dev/null || true
            cp data/own_goals.csv "$KEEP_DIR/data/own_goals.csv" 2>/dev/null || true
            cp assets/lanes_sportsdata.png "$KEEP_DIR/assets/lanes_sportsdata.png" 2>/dev/null || true

            git fetch origin main
            git reset --hard origin/main
            python -m pip install -q -r requirements.txt

            cp "$KEEP_DIR/data/schedule.csv" data/schedule.csv 2>/dev/null || true
            cp "$KEEP_DIR/data/own_goals.csv" data/own_goals.csv 2>/dev/null || true
            cp "$KEEP_DIR/assets/lanes_sportsdata.png" assets/lanes_sportsdata.png 2>/dev/null || true

            export PYTHONUTF8=1
            python run_all.py --reports-only
            if [ -f assets/lanes_sportsdata.svg ]; then
              rsvg-convert -w 360 assets/lanes_sportsdata.svg -o assets/lanes_sportsdata.png || true
            fi
          done

          echo "Push failed after $MAX_RETRIES attempts."
          exit 1
