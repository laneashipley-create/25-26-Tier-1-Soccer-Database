# EPL Own Goals — Weekly email via Brevo + report/CSV refresh for that send.
# Expects data from daily --daily runs and weekly-data-pipeline.yml (bi-weekly steps 1–7 + HTML).
# This job mainly drives the weekly email and keeps own_goals.csv + HTML aligned for that send.
# Runs Wednesday 05:00 UTC (~Tuesday 9 PM US Pacific in standard time).
name: Weekly Email + Own Goal Report update

on:
  schedule:
    # Wed 05:00 UTC — Tuesday ~9:00 PM US Pacific (standard time); one email per week.
    - cron: "0 5 * * 3"
  workflow_dispatch:  # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push commits
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Save previous own goals snapshot
        run: |
          mkdir -p .tmp
          if git show HEAD:data/own_goals.csv > .tmp/previous_own_goals.csv 2>/dev/null; then
            echo "Saved previous own_goals.csv from HEAD"
          else
            printf "sport_event_id,match_date,round,home_team,away_team,og_player,og_player_id,og_player_team,benefiting_team,minute,stoppage_time,home_score_after,away_score_after,final_home_score,final_away_score,commentary\n" > .tmp/previous_own_goals.csv
          fi

      - name: Regenerate HTML reports from Supabase
        env:
          SUPABASE_URL: https://yoesorfzvtbdmvrdtqoo.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          export PYTHONUTF8=1
          python run_all.py --reports-only

      - name: Export own goals CSV for email diff + repo
        env:
          SUPABASE_URL: https://yoesorfzvtbdmvrdtqoo.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          export PYTHONUTF8=1
          python export_own_goals_csv.py data/own_goals.csv

      - name: Build email summary for new own goals
        run: |
          python build_email_summary.py .tmp/previous_own_goals.csv data/own_goals.csv .tmp/email_summary.html

      - name: Build final email body
        run: |
          python build_email_body.py .tmp/email_summary.html .tmp/email_body.html

      - name: Convert logo SVG to PNG (for Outlook/Gmail compatibility)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq librsvg2-bin
          rsvg-convert -w 360 assets/lanes_sportsdata.svg -o assets/lanes_sportsdata.png

      - name: Commit and push updated report
        env:
          SUPABASE_URL: https://yoesorfzvtbdmvrdtqoo.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          REPORT_FILES=(
            report.html report_hub.html wc2026_schedule.html
            report_own_goals.html report_master_games.html
            report_penalty_shootouts.html report_var_events.html
            report_var_unpaired.html report_water_break_events.html
            report_water_break_unpaired.html report_recordings_library.html
            data/schedule.csv data/own_goals.csv assets/lanes_sportsdata.png
          )
          COMMIT_MSG="chore: weekly own goals report update [skip ci]"
          MAX_RETRIES=3
          KEEP_DIR="$RUNNER_TEMP/workflow-keep"
          mkdir -p "$KEEP_DIR" "$KEEP_DIR/data" "$KEEP_DIR/assets"

          for attempt in $(seq 1 "$MAX_RETRIES"); do
            git add "${REPORT_FILES[@]}" || true
            if git diff --staged --quiet; then
              echo "Attempt $attempt: no changes to commit."
              exit 0
            fi
            git commit -m "$COMMIT_MSG"

            if git push; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi

            echo "Push attempt $attempt rejected."
            if [ "$attempt" -ge "$MAX_RETRIES" ]; then
              break
            fi

            echo "Preserving workflow data files, pulling latest source, regenerating HTML..."
            cp data/schedule.csv "$KEEP_DIR/data/schedule.csv" 2>/dev/null || true
            cp data/own_goals.csv "$KEEP_DIR/data/own_goals.csv" 2>/dev/null || true
            cp assets/lanes_sportsdata.png "$KEEP_DIR/assets/lanes_sportsdata.png" 2>/dev/null || true

            git fetch origin main
            git reset --hard origin/main
            python -m pip install -q -r requirements.txt

            cp "$KEEP_DIR/data/schedule.csv" data/schedule.csv 2>/dev/null || true
            cp "$KEEP_DIR/data/own_goals.csv" data/own_goals.csv 2>/dev/null || true
            cp "$KEEP_DIR/assets/lanes_sportsdata.png" assets/lanes_sportsdata.png 2>/dev/null || true

            export PYTHONUTF8=1
            python run_all.py --reports-only
            if [ -f assets/lanes_sportsdata.svg ]; then
              rsvg-convert -w 360 assets/lanes_sportsdata.svg -o assets/lanes_sportsdata.png || true
            fi
          done

          echo "Push failed after $MAX_RETRIES attempts."
          exit 1

      - name: Send email notification via Brevo
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: |
          SENDER_NAME="Lane's SportsData Bot"
          BODY=$(jq -n \
            --arg sender "$SENDER_NAME" \
            --rawfile html ".tmp/email_body.html" \
            '{
              sender: {name: $sender, email: "sportsdata@keepstagecoachfree.com"},
              to: [
                {email: "l.shipley@sportradar.com", name: "Lane Shipley"},
                {email: "n.masterson@sportradar.com", name: "Nicole Masterson"},
                {email: "v.gupta@sportradar.com", name: "Vishaal Gupta"},
                {email: "m.byrnes@sportradar.com", name: "Matt Byrnes"},
                {email: "m.lopez@sportradar.com", name: "Matt Lopez"},
                {email: "j.herbstman@sportradar.com", name: "Jordan Herbstman"},
                {email: "j.padden@sportradar.com", name: "James Padden"},
                {email: "p.cohn@sportradar.com"}
              ],
              subject: "Weekly Tier 1 Soccer Leagues || 25/26 Seasons || Various Reports",
              htmlContent: $html
            }')
          curl -s -X POST "https://api.brevo.com/v3/smtp/email" \
            -H "api-key: $BREVO_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$BODY"
