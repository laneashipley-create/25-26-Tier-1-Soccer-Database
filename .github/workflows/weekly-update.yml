# EPL Own Goals — Weekly email + HTML only (fast). Brevo is the only email sender here.
# Expects Supabase to already be updated by daily --daily runs and weekly-data-pipeline.yml
# (Wed 04:00 UTC: full schedule + all missing timelines + steps 4–5).
# Runs Wednesday 05:00 UTC (~Tuesday 9 PM US Pacific in standard time).
name: Weekly EPL Own Goals Update

on:
  schedule:
    # Wed 05:00 UTC — Tuesday ~9:00 PM US Pacific (standard time); one email per week.
    - cron: "0 5 * * 3"
  workflow_dispatch:  # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push commits
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Save previous own goals snapshot
        run: |
          mkdir -p .tmp
          if git show HEAD:data/own_goals.csv > .tmp/previous_own_goals.csv 2>/dev/null; then
            echo "Saved previous own_goals.csv from HEAD"
          else
            printf "sport_event_id,match_date,round,home_team,away_team,og_player,og_player_id,og_player_team,benefiting_team,minute,stoppage_time,home_score_after,away_score_after,final_home_score,final_away_score,commentary\n" > .tmp/previous_own_goals.csv
          fi

      - name: Regenerate HTML reports from Supabase
        env:
          SUPABASE_URL: https://yoesorfzvtbdmvrdtqoo.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          export PYTHONUTF8=1
          python run_all.py --reports-only

      - name: Export own goals CSV for email diff + repo
        env:
          SUPABASE_URL: https://yoesorfzvtbdmvrdtqoo.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          export PYTHONUTF8=1
          python export_own_goals_csv.py data/own_goals.csv

      - name: Build email summary for new own goals
        run: |
          python build_email_summary.py .tmp/previous_own_goals.csv data/own_goals.csv .tmp/email_summary.html

      - name: Build final email body
        run: |
          python build_email_body.py .tmp/email_summary.html .tmp/email_body.html

      - name: Convert logo SVG to PNG (for Outlook/Gmail compatibility)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq librsvg2-bin
          rsvg-convert -w 360 assets/lanes_sportsdata.svg -o assets/lanes_sportsdata.png

      - name: Commit and push updated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add report.html report_hub.html report_own_goals.html report_master_games.html report_penalty_shootouts.html report_var_events.html report_var_unpaired.html report_recordings_library.html data/schedule.csv data/own_goals.csv assets/lanes_sportsdata.png
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: weekly own goals report update [skip ci]"
            git push
          fi

      - name: Send email notification via Brevo
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: |
          SENDER_NAME="Lane's SportsData Bot"
          BODY=$(jq -n \
            --arg sender "$SENDER_NAME" \
            --rawfile html ".tmp/email_body.html" \
            '{
              sender: {name: $sender, email: "sportsdata@keepstagecoachfree.com"},
              to: [
                {email: "l.shipley@sportradar.com", name: "Lane Shipley"},
                {email: "n.masterson@sportradar.com", name: "Nicole Masterson"},
                {email: "v.gupta@sportradar.com", name: "Vishaal Gupta"},
                {email: "m.byrnes@sportradar.com", name: "Matt Byrnes"},
                {email: "m.lopez@sportradar.com", name: "Matt Lopez"},
                {email: "j.herbstman@sportradar.com", name: "Jordan Herbstman"},
                {email: "j.padden@sportradar.com", name: "James Padden"},
                {email: "p.cohn@sportradar.com"}
              ],
              subject: "Weekly Tier 1 Soccer Leagues || 25/26 Seasons || Various Reports",
              htmlContent: $html
            }')
          curl -s -X POST "https://api.brevo.com/v3/smtp/email" \
            -H "api-key: $BREVO_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$BODY"
